<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeGPT - AI Plays Pokémon Platinum</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <span class="logo-poke">Poke</span><span class="logo-gpt">GPT</span>
            </div>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span id="connection-status">Connecting...</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Left Side: Game Display -->
            <section class="game-section">
                <div class="game-container">
                    <!-- The MJPEG stream from the backend -->
                    <img id="game-stream" src="/video_feed" alt="Game Stream">
                    
                    <!-- Controller Overlay -->
                    <div class="controller-overlay">
                        <div class="dpad">
                            <div class="btn dpad-btn up" id="btn-UP"></div>
                            <div class="btn dpad-btn left" id="btn-LEFT"></div>
                            <div class="btn dpad-btn right" id="btn-RIGHT"></div>
                            <div class="btn dpad-btn down" id="btn-DOWN"></div>
                            <div class="dpad-center"></div>
                        </div>
                        <div class="action-buttons">
                            <div class="btn action-btn y" id="btn-Y"><span>Y</span></div>
                            <div class="btn action-btn x" id="btn-X"><span>X</span></div>
                            <div class="btn action-btn b" id="btn-B"><span>B</span></div>
                            <div class="btn action-btn a" id="btn-A"><span>A</span></div>
                        </div>
                        <div class="menu-buttons">
                            <div class="btn menu-btn select" id="btn-SELECT"><span>SELECT</span></div>
                            <div class="btn menu-btn start" id="btn-START"><span>START</span></div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Right Side: AI Reasoning Chat -->
            <section class="chat-section">
                <div class="chat-header">
                    <h2>AI Reasoning Log</h2>
                </div>
                <div class="chat-history" id="chat-history">
                    <!-- Chat messages will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
